name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY || 'placeholder-service-key' }}
          NEXT_PUBLIC_MAPTILER_KEY: ${{ secrets.STAGING_MAPTILER_KEY || 'placeholder' }}
          RESEND_API_KEY: ${{ secrets.STAGING_RESEND_API_KEY || 'placeholder' }}
          EMAIL_FROM: 'Náš stát <noreply@nasstat.cz>'
          NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
