name: Deploy to Production

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deployment'
        required: false
        default: 'Manual production deployment'

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_MAPTILER_KEY: ${{ secrets.PROD_MAPTILER_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.PROD_APP_URL }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.PROD_SENTRY_DSN }}

      - name: Deploy to Vercel (production)
        # Requires the following GitHub Actions secrets:
        #   VERCEL_TOKEN          – API token from vercel.com/account/tokens
        #   VERCEL_ORG_ID         – found in .vercel/project.json after `vercel link`
        #   VERCEL_PROJECT_ID     – found in .vercel/project.json after `vercel link`
        #
        # Requires the following secrets for the production environment:
        #   PROD_SUPABASE_URL
        #   PROD_SUPABASE_ANON_KEY
        #   PROD_SUPABASE_SERVICE_ROLE_KEY
        #   PROD_MAPTILER_KEY
        #   PROD_RESEND_API_KEY
        #   PROD_APP_URL              – e.g. https://nasstat.cz
        #   PROD_SENTRY_DSN           – DSN from sentry.io project settings
        #
        # Setup instructions:
        #   1. Create a separate Supabase project for production
        #   2. Run migrations: supabase db push --linked
        #   3. npm i -g vercel && vercel link
        #   4. Add all secrets above in GitHub → Settings → Secrets → Actions
        #   5. Configure domain DNS: CNAME/A records pointing to Vercel
        run: |
          npx vercel --token "${{ secrets.VERCEL_TOKEN }}" \
            --prod \
            --yes \
            --env NEXT_PUBLIC_SUPABASE_URL="${{ secrets.PROD_SUPABASE_URL }}" \
            --env NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.PROD_SUPABASE_ANON_KEY }}" \
            --env SUPABASE_SERVICE_ROLE_KEY="${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}" \
            --env NEXT_PUBLIC_MAPTILER_KEY="${{ secrets.PROD_MAPTILER_KEY }}" \
            --env RESEND_API_KEY="${{ secrets.PROD_RESEND_API_KEY }}" \
            --env NEXT_PUBLIC_APP_URL="${{ secrets.PROD_APP_URL }}" \
            --env EMAIL_FROM="Náš stát <noreply@nasstat.cz>" \
            --env NEXT_PUBLIC_SENTRY_DSN="${{ secrets.PROD_SENTRY_DSN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
